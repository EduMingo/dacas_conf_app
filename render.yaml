services:
  # ── Backend FastAPI ──────────────────────────────────────────────
  - type: web
    name: dacas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: STOCK_SOURCE_URL
        value: https://docs.google.com/spreadsheets/d/13db2bnxG8jT0qcgKwWOmuLP-wGUdWrh3/export?format=xlsx
      - key: CORS_ORIGINS
        value: https://dacas-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend React (Static Site) ─────────────────────────────────
  - type: web
    name: dacas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && CI=false npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://dacas-backend.onrender.com
      - key: NODE_VERSION
        value: "20.11.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
