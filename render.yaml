services:
  # ── Backend FastAPI ──────────────────────────────────────────────
  - type: web
    name: dacas-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements-render.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: STOCK_SOURCE_URL
        value: https://docs.google.com/spreadsheets/d/13db2bnxG8jT0qcgKwWOmuLP-wGUdWrh3/export?format=xlsx
      - key: CORS_ORIGINS
        value: https://dacas-frontend.onrender.com
      - key: PYTHON_VERSION
        value: "3.11.0"

  # ── Frontend React (Static Site) ─────────────────────────────────
  - type: web
    name: dacas-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && CI=false npm run build
    staticPublishPath: build
    envVars:
      - key: REACT_APP_BACKEND_URL
        value: https://dacas-backend.onrender.com
      - key: NODE_VERSION
        value: "20.11.0"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
# 1. Cambia date-fns de ^4 a ^3.6.0 en el package.json del repo
sed -i 's/"date-fns": "^4..."/"date-fns": "^3.6.0"/g' package.json

# 2. Saca la línea de @emergentbase
sed -i '/@emergentbase/d' package.json

# 3. Instala con legacy-peer-deps (acepta conflictos)
npm install --legacy-peer-deps

# 4. Build sin tratar warnings como errores
CI=false npm run build
